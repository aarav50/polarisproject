<html>
    <head>
        <style>
            .buttonclassmain:hover{
                box-shadow: 0px 0px 20px #39FF14;
            }
            .buttonclassmain{
                display: block;
                background-color: #39FF14;
                border:#00ffff solid 8px;
                border-radius: 30px;
                width: 300px;
                height: 50px;
                color:#000000;
                margin: auto;
                font-size: 20pt;
                font-family: 'Lucida Sans';
                font-weight: bold;
            }
            .inputclassmain:hover{
                box-shadow: 0px 0px 20px #39FF14; 
            }
            .inputclassmain{
                display: block;
                background-color: #39FF14;
                border:#00ffff solid 8px;
                border-radius: 30px;
                width: 300px;
                height: 50px;
                color:#000000;
                margin: auto;
                font-size: 20pt;
                font-family: 'Lucida Sans';
                font-weight: bold;
            }
            .styleingclass1{
                margin-left: 25px;
                background-color: black;
                border: #ffffff solid 3px;
                width: 300px;
                height: 30px;
                color:#39FF14;
            }
            .styleingclass2{
                color:#39FF14;
                margin-left: 15px;
            }
            .styleingclass3{
                color:#39FF14;
                margin-left: 15px;
                text-align: center;
            }
            body{    
                background-color: black;
                display: flex;
                flex-direction: column
            }
            .styleingclass4{
                align-self: center;
                justify-self: center;
                outline: #00ffff solid 10px;
                width: 400px;
                border-radius: 50px;
                background-color: black;
                display: flex;
                flex-direction: column;
        }
        .style5{
            align-self: center;
            font-size: 40pt;
            color: #00ffff;
        }
        .style6{
            align-self: center;
            justify-self: center;
            outline: #00ffff solid 10px;
            width: 400px;
             border-radius: 50px;
            background-color: black;
            display: flex; 
            flex-direction: column;
        }
        </style>
        

    </head>
    <body >
        <h1 class="style5">Todo List</h1>
    <div class="style6">
    <form id="hi">
        <h2 class="styleingclass2" >Name Of Activity</h2>
        <input type="text" class="styleingclass1" id="hii">
        <h2 class="styleingclass2">Priority</h2>
        <select  class="styleingclass1" id="hiii">
            <option disabled selected>Select</option>
            <option>Ultra High</option>
            <option>High</option>
            <option>Meduim</option>
            <option>Low</option>
            <option>Ultra Low</option>
        </select>
        <br>
        <br>
        <br>
        <br>
        <input type="submit" class="inputclassmain" >
    </form>
    </div>
    <script>
        var a = document.querySelector("#hi")
        var d = document.querySelector("#hii")
        var e = document.querySelector("#hiii")
        var b = 0
        var k=[]
        function onSubmit(even){
            even.preventDefault()
            var temp=document.createElement("div")
            temp.id=`hiiiii${b}`
            temp.className="styleingclass4"
            var tempy=document.createElement("h2")
            tempy.className="styleingclass3"
            tempy.textContent=`Name Of Activity:${d.value}`
            var tempyy=document.createElement("h2")
            tempyy.className="styleingclass3"
            tempyy.textContent=`Priority:${e.value}`
            var tempyyy=document.createElement("button")
            
            tempyyy.textContent="finish"
            tempyyy.id=`hiiiiiiiii${b}`
            tempyyy.className="buttonclassmain"
            temp.appendChild(tempy)
            temp.appendChild(tempyy)
            temp.appendChild(tempyyy)
            document.body.appendChild(temp)
            b=b+1

            d.value=""
            e.value="Select"
            

        }
        function click(event){
            if (event.target.className=="buttonclassmain"){
                var outlinee=event.target.id
                var code="hiiiii"+outlinee.slice(10)
                document.getElementById(code).remove()



            }
        }
        a.onsubmit = onSubmit
        document.addEventListener("click",click)
        


        




    </script>

    </body>
</html>
